<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kalkulator Sederhana</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background: #f4f4f4;
    }

    .calculator {
      background: #222;
      padding: 20px;
      border-radius: 10px;
      width: 250px;
    }

    .display {
      background: #000;
      color: #0f0;
      font-size: 2em;
      padding: 10px;
      text-align: right;
      margin-bottom: 10px;
      border-radius: 5px;
      overflow-x: auto;
    }

    .buttons {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
    }

    button {
      padding: 15px;
      font-size: 1.2em;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }

    .operator { background: orange; }
    .equal { background: green; color: white; }
    .clear { background: red; color: white; }
  </style>
</head>
<body>

<div class="calculator">
  <div class="display" id="display">0</div>

  <div class="buttons" id="buttons">
    <button data-action="clear" class="clear">C</button>
    <button data-value="/">÷</button>
    <button data-value="*">×</button>
    <button data-value="-">−</button>

    <button data-value="7">7</button>
    <button data-value="8">8</button>
    <button data-value="9">9</button>
    <button data-value="+">+</button>

    <button data-value="4">4</button>
    <button data-value="5">5</button>
    <button data-value="6">6</button>
    <button data-action="equal" class="equal">=</button>
    <button data-value="1">1</button>
    <button data-value="2">2</button>
    <button data-value="3">3</button>
    <button data-value="0">0</button>

    <button data-value=".">.</button>
  </div>
</div>

<script src="latihan-1.js"></script>
</body>
</html>
