<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Toko Buket</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #fff0f5;
    }

    header {
      background: #ff69b4;
      color: white;
      padding: 15px;
      display: flex;
      justify-content: space-between;
    }

    .badge {
      background: red;
      border-radius: 50%;
      padding: 5px 8px;
      font-size: 12px;
    }

    .container {
      display: flex;
      flex-wrap: wrap;
    }

    .products {
  flex: 2;
  height: 5vh;
  display: grid;
  grid-template-columns: repeat(3, 1fr); /* 3 kolom */
  gap: 15px;
  padding: 15px;
}

    .card {
      width: 100%;
      background: white;
      border-radius: 10px;
      padding: 10px;
      text-align: center;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }

    .card img {
      width: 100%;
      height: 220px;
      object-fit: cover;
      object-position: center;
      border-radius: 10px;
    }

    .card h4 {
      margin: 10px 0 5px;
    }

    .card p {
      margin: 0;
    }

    .card button {
      margin-top: 10px;
      padding: 8px;
      width: 100%;
      background: #ff69b4;
      color: white;
      border: none;
      cursor: pointer;
    }

    .cart {
      flex: 1;
      border-left: 2px solid #ddd;
      padding: 15px;
      min-width: 250px;
      background: white;
    }

    .cart-item {
      border-bottom: 1px solid #ccc;
      padding: 10px 0;
    }

    .checkout {
      margin-top: 10px;
      width: 100%;
      padding: 10px;
      background: green;
      color: white;
      border: none;
      cursor: pointer;
    }

    @media(max-width: 768px) {
      .container {
        flex-direction: column;
      }

      .cart {
        border-left: none;
        border-top: 2px solid #ddd;
      }
    }
  </style>
</head>`
<body>

<header>
  <h2>fika_flolaris</h2>
  <div>🛒 <span id="badge" class="badge">0</span></div>
</header>

<div class="container">
  <div id="products" class="products"></div>

  <div class="cart">
    <h3>Keranjang</h3>
    <div id="cart-items"></div>
    <h4>Total: Rp <span id="total">0</span></h4>
    <button id="checkout" class="checkout">Checkout</button>
  </div>
</div>

<script src="latihan-2.js"></script>
</body>
</html>
